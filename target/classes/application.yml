server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: notes-management-api

  # ==================== DATABASE ====================
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notes_db}
    username: ${DB_USERNAME:apple}
    password: ${DB_PASSWORD:Password@633}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: NotesHikariPool

  # ==================== JPA / HIBERNATE ====================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  # ==================== JACKSON ====================
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# ==================== JWT ====================
application:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:86400000}   # 24 hours in ms

# ==================== SPRINGDOC / SWAGGER ====================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true

# ==================== LOGGING ====================
logging:
  level:
    com.notes.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
